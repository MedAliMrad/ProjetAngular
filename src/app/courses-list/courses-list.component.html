  <div class="course-list-container">
  <div class="header">
    <h2>Découvrez nos Cours</h2>
    <p class="subtitle">Trouvez la formation parfaite pour vous</p>
  </div>

  <div class="search-bar">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <input 
      type="text" 
      placeholder="Rechercher un cours..." 
      [(ngModel)]="searchTerm"
      (input)="onSearchChange()"
    >
    <span class="result-count" *ngIf="searchTerm">
      {{ filteredCourses().length }} résultat(s)
    </span>
  </div>

  <div class="course-grid" *ngIf="filteredCourses().length > 0">
    <div class="course-card" *ngFor="let course of filteredCourses(); trackBy: trackByCourseId">
      <div class="image-wrapper">
        <img [src]="course.thumbnail" [alt]="course.title + ' thumbnail'" loading="lazy">
        <div class="overlay">
          <span class="badge">Nouveau</span>
        </div>
      </div>

      <div class="course-content">
        <div class="course-info">
          <h3>{{ course.title }}</h3>
          <p class="description">{{ course.description }}</p>
        </div>

      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="filteredCourses().length === 0">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <h3>Aucun cours trouvé</h3>
    <p>Essayez de modifier votre recherche</p>
  </div>
</div>
